    <meta name="twitter:card" content="summary_large_image" />

    />

    <meta name="theme-color" content="#1a1a1a" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .contact-page {
        padding: 100px 0 80px;
        min-height: 100vh;
        background: var(--white);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .contact-page .page-title {
        font-size: 56px;
        font-weight: 800;
        text-align: center;
        color: var(--black);
        margin-bottom: 0;
      }
      .contact-title-line {
        width: 300px;
        height: 1px;
        background: var(--gold);
        margin: 12px auto 50px;
      }
      .contact-form-wrap {
        background: #faf9f7;
        border-radius: 12px;
        border: 1px solid #e8e0d8;
        padding: 48px;
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--black);
        margin-bottom: 6px;
        font-family: "Abhaya Libre", Georgia, serif;
      }
      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid #e0d8d0;
        border-radius: 6px;
        font-family: "Abhaya Libre", Georgia, serif;
        font-size: 15px;
        color: var(--black);
        background: var(--white);
        outline: none;
        transition: border-color 0.2s;
      }
      .form-group input:focus,
      .form-group textarea:focus {
        border-color: var(--emerald);
      }
      .form-group textarea {
        resize: vertical;
        min-height: 130px;
      }
      .btn-send {
        background: var(--emerald);
        color: var(--white);
        border: none;
        padding: 13px 40px;
        border-radius: 8px;
        font-family: "Abhaya Libre", Georgia, serif;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.3s;
        width: 100%;
        margin-top: 4px;
      }
      .btn-send:hover {
        background: var(--burgundy);
      }
      .contact-icons {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 40px;
      }
      .contact-icon-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--black);
        transition: color 0.2s;
      }
      .contact-icon-item:hover {
        color: var(--emerald);
      }
      .contact-icon-circle {
        width: 52px;
        height: 52px;
        background: var(--burgundy);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 20px;
        transition: background 0.2s;
      }
      .contact-icon-item:hover .contact-icon-circle {
        background: var(--emerald);
      }
      .contact-icon-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--black);
      }
      .form-success {
        display: none;
        text-align: center;
        padding: 40px 0;
      }
      .form-success span {
        font-size: 48px;
        display: block;
        margin-bottom: 16px;
      }
      .form-success h3 {
        font-size: 28px;
        font-weight: 800;
        color: var(--black);
      }
      .form-success p {
        color: #666;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <a href="index.html" class="logo">M</a>
        <ul class="nav-menu">
          <li><a href="work.html">Work</a></li>
          <li><a href="about.html">About</a></li>
          <li>
            <a href="contact.html" style="color: var(--emerald)">Contact</a>
          </li>
        </ul>
      </div>
    </nav>
    <section class="contact-page">
      <h1 class="page-title">Contact</h1>
      <div class="contact-title-line"></div>
      <div class="contact-form-wrap">
        <form
          id="contactForm"
          action="https://formspree.io/f/meepzrzg"
          method="POST"
        >
          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your name"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="your@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              placeholder="Tell me about your project..."
              required
            ></textarea>
          </div>
          <button type="submit" class="btn-send">Send Message</button>
        </form>
        <div class="form-success" id="formSuccess">
          <span>✉️</span>
          <h3>Message sent!</h3>
          <p>I'll get back to you within 24 hours.</p>
        </div>
      </div>
      <div class="contact-icons">
        <a href="mailto:info@novawebstudio.io" class="contact-icon-item">
          <div class="contact-icon-circle"><i class="fas fa-envelope"></i></div>
          <span class="contact-icon-label">Email</span>
        </a>
        <a
          href="https://www.linkedin.com/in/michelle-de-villiers-696560128"
          target="_blank"
          rel="noopener"
          class="contact-icon-item"
        >
          <div class="contact-icon-circle"><i class="fab fa-linkedin"></i></div>
          <span class="contact-icon-label">LinkedIn</span>
        </a>
        <a
          href="https://github.com/Michellex255"
          target="_blank"
          rel="noopener"
          class="contact-icon-item"
        >
          <div class="contact-icon-circle"><i class="fab fa-github"></i></div>
          <span class="contact-icon-label">GitHub</span>
        </a>
      </div>
    </section>
    <footer class="footer">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-6 footer-left">
            <a href="mailto:info@novawebstudio.io" class="footer-email"
              >info@novawebstudio.io</a
            >
          </div>
          <div class="col-md-6 footer-right">
            <div class="footer-links">
              <a href="work.html">Work</a>
              <a href="about.html">About</a>
              <a href="contact.html">Contact</a>
            </div>
            <div class="social-links">
              <a
                href="https://www.linkedin.com/in/michelle-de-villiers-696560128"
                target="_blank"
                rel="noopener"
                aria-label="LinkedIn"
                ><i class="fab fa-linkedin"></i
              ></a>
              <a
                href="https://github.com/Michellex255"
                target="_blank"
                rel="noopener"
                aria-label="GitHub"
                ><i class="fab fa-github"></i
              ></a>
              <a href="mailto:info@novawebstudio.io" aria-label="Email"
                ><i class="fas fa-envelope"></i
              ></a>
            </div>
          </div>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2026 Nova Web Studio. All rights reserved.</p>
        </div>
      </div>
    </footer>
    <script>
      const form = document.getElementById("contactForm");
      const success = document.getElementById("formSuccess");
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const data = new FormData(form);
        const response = await fetch(form.action, {
          method: "POST",
          body: data,
          headers: { Accept: "application/json" },
        });
        if (response.ok) {
          form.style.display = "none";
          success.style.display = "block";
        }
      });
    </script>
  </body>
</html>
